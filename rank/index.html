<!DOCTYPE html>
<html lang="ko">
<script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark')</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실검 순위</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .dark body { background-color: #111827; }
        .chart-canvas {
            background-color: white;
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .dark .chart-canvas { background-color: #1f2937; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        .keyword-btn { transition: all 0.15s; }
        .keyword-btn.active { ring: 2; font-weight: bold; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="p-4 md:p-8 dark:text-gray-200">
    <div class="max-w-5xl mx-auto space-y-6">
        <div class="flex justify-center items-center gap-3">
            <a href="../" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-sm">&larr; 근스피</a>
            <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100 text-center">
                실검 순위
            </h1>
            <button onclick="toggleDarkMode()" id="darkModeBtn" class="text-xl" title="다크모드 토글">🌙</button>
        </div>

        <p id="statusMessage" class="text-sm text-red-500 font-medium hidden text-center"></p>

        <!-- 현재 순위 테이블 -->
        <div class="chart-canvas">
            <h2 class="text-lg font-bold mb-3 text-gray-700 dark:text-gray-200">현재 순위</h2>
            <div id="currentRankGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 text-sm"></div>
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-2" id="lastUpdated">데이터 로드 대기 중...</p>
        </div>

        <!-- 전체 순위 동향 (범프 차트) -->
        <div class="chart-canvas">
            <h2 class="text-lg font-bold mb-3 text-gray-700 dark:text-gray-200">전체 순위 동향</h2>
            <p class="text-xs text-gray-400 dark:text-gray-500 mb-2">마우스를 올리면 해당 시점의 키워드가 표시됩니다</p>
            <div class="h-[500px]">
                <canvas id="bumpChart"></canvas>
            </div>
        </div>

        <!-- 키워드 선택 -->
        <div class="chart-canvas">
            <h2 class="text-lg font-bold mb-3 text-gray-700 dark:text-gray-200">키워드별 순위 변화</h2>
            <p class="text-xs text-gray-400 dark:text-gray-500 mb-2">키워드를 클릭하면 차트에 표시됩니다 (최대 5개)</p>
            <div id="keywordButtons" class="flex flex-wrap gap-2 mb-4"></div>
            <div class="h-[400px]">
                <canvas id="rankChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://raw.githubusercontent.com/geunseupi/geunseupi--data/main/rank.csv';
        const MAX_SELECTED = 5;
        const COLORS = [
            'rgb(239, 68, 68)', 'rgb(59, 130, 246)', 'rgb(16, 185, 129)',
            'rgb(234, 179, 8)', 'rgb(168, 85, 247)'
        ];

        let isDarkMode = localStorage.getItem('darkMode') === 'true';
        let allData = []; // [{timestamp, ranks: [keyword, ...]}]
        let allKeywords = new Set();
        let selectedKeywords = ['ㅇㅇㄱ'];
        let myChart = null;
        let bumpChart = null;

        const BUMP_COLORS = [
            '#ef4444','#f97316','#f59e0b','#eab308','#84cc16',
            '#22c55e','#14b8a6','#06b6d4','#0ea5e9','#3b82f6',
            '#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899',
            '#f43f5e','#78716c','#64748b','#0d9488','#b45309',
            '#dc2626','#7c3aed'
        ];

        if (isDarkMode) document.documentElement.classList.add('dark');

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark', isDarkMode);
            localStorage.setItem('darkMode', isDarkMode);
            document.getElementById('darkModeBtn').textContent = isDarkMode ? '☀️' : '🌙';
            if (myChart) updateChart();
            if (bumpChart) updateBumpChart();
        }

        function getChartColors() {
            return isDarkMode
                ? { text: '#d1d5db', grid: 'rgba(255,255,255,0.1)' }
                : { text: '#4b5563', grid: 'rgba(0,0,0,0.05)' };
        }

        function parseCsv(text) {
            const rows = text.trim().split('\n');
            if (rows.length < 2) return;

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',').map(c => c.trim());
                if (cols.length < 2) continue;
                const timestamp = new Date(cols[0]);
                if (isNaN(timestamp.getTime())) continue;
                const ranks = cols.slice(1);
                allData.push({ timestamp: timestamp.getTime(), ranks });
                ranks.forEach(k => { if (k) allKeywords.add(k); });
            }
            allData.sort((a, b) => a.timestamp - b.timestamp);
        }

        function renderCurrentRank() {
            const grid = document.getElementById('currentRankGrid');
            if (allData.length === 0) { grid.innerHTML = '<p>데이터 없음</p>'; return; }

            const latest = allData[allData.length - 1];
            const prev = allData.length >= 2 ? allData[allData.length - 2] : null;

            grid.innerHTML = latest.ranks.map((keyword, i) => {
                const rank = i + 1;
                let changeHtml = '';
                if (prev) {
                    const prevRank = prev.ranks.indexOf(keyword) + 1;
                    if (prevRank === 0) {
                        changeHtml = '<span class="text-green-500 text-xs ml-1">NEW</span>';
                    } else if (prevRank > rank) {
                        changeHtml = `<span class="text-red-500 text-xs ml-1">&uarr;${prevRank - rank}</span>`;
                    } else if (prevRank < rank) {
                        changeHtml = `<span class="text-blue-500 text-xs ml-1">&darr;${rank - prevRank}</span>`;
                    } else {
                        changeHtml = '<span class="text-gray-400 text-xs ml-1">-</span>';
                    }
                }
                const isOOG = keyword === 'ㅇㅇㄱ';
                const highlight = isOOG ? 'bg-emerald-100 dark:bg-emerald-900 border-emerald-400' : 'border-gray-200 dark:border-gray-600';
                return `<div class="flex items-center p-2 rounded border ${highlight}">
                    <span class="font-bold text-gray-500 dark:text-gray-400 w-6 text-right mr-2">${rank}</span>
                    <span class="${isOOG ? 'font-bold text-emerald-600 dark:text-emerald-400' : ''}">${keyword}</span>
                    ${changeHtml}
                </div>`;
            }).join('');

            const time = new Date(latest.timestamp);
            document.getElementById('lastUpdated').textContent = `마지막 기록: ${time.toLocaleString('ko-KR')}`;
        }

        function renderKeywordButtons() {
            const container = document.getElementById('keywordButtons');
            const sorted = [...allKeywords].sort((a, b) => {
                if (a === 'ㅇㅇㄱ') return -1;
                if (b === 'ㅇㅇㄱ') return 1;
                return a.localeCompare(b, 'ko');
            });

            container.innerHTML = sorted.map(keyword => {
                const isActive = selectedKeywords.includes(keyword);
                const colorIdx = isActive ? selectedKeywords.indexOf(keyword) : -1;
                const borderColor = colorIdx >= 0 ? COLORS[colorIdx] : '';
                const activeClass = isActive
                    ? 'ring-2 font-bold text-white'
                    : 'bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600';
                const style = isActive ? `background-color:${borderColor};ring-color:${borderColor}` : '';
                return `<button class="keyword-btn px-3 py-1 rounded-full text-sm ${activeClass}" style="${style}" onclick="toggleKeyword('${keyword.replace(/'/g, "\\'")}')">${keyword}</button>`;
            }).join('');
        }

        function toggleKeyword(keyword) {
            const idx = selectedKeywords.indexOf(keyword);
            if (idx >= 0) {
                selectedKeywords.splice(idx, 1);
            } else {
                if (selectedKeywords.length >= MAX_SELECTED) selectedKeywords.shift();
                selectedKeywords.push(keyword);
            }
            renderKeywordButtons();
            updateChart();
        }

        function buildDatasets() {
            return selectedKeywords.map((keyword, i) => {
                const points = [];
                for (const entry of allData) {
                    const rank = entry.ranks.indexOf(keyword) + 1;
                    points.push({ x: entry.timestamp, y: rank > 0 ? rank : null });
                }
                return {
                    label: keyword,
                    data: points,
                    parsing: false,
                    borderColor: COLORS[i],
                    backgroundColor: COLORS[i],
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    tension: 0,
                    spanGaps: false
                };
            });
        }

        function updateChart() {
            const ctx = document.getElementById('rankChart').getContext('2d');
            const c = getChartColors();
            const datasets = buildDatasets();

            // 보이는 rank의 max 계산
            let maxRank = 10;
            for (const ds of datasets) {
                for (const p of ds.data) {
                    if (p.y != null && p.y > maxRank) maxRank = p.y;
                }
            }

            const config = {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'hour', tooltipFormat: 'yyyy-MM-dd HH:mm' },
                            ticks: { color: c.text },
                            grid: { color: c.grid }
                        },
                        y: {
                            reverse: true,
                            min: 1,
                            max: maxRank + 1,
                            ticks: {
                                color: c.text,
                                stepSize: 1,
                                callback: v => Number.isInteger(v) ? v : ''
                            },
                            grid: { color: c.grid },
                            title: { display: true, text: '순위', color: c.text }
                        }
                    },
                    plugins: {
                        legend: { display: true, position: 'top', labels: { color: c.text } },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            filter: item => item.raw.y != null,
                            callbacks: {
                                label: ctx => ctx.raw.y != null
                                    ? `${ctx.dataset.label}: ${ctx.raw.y}위`
                                    : null
                            }
                        }
                    }
                }
            };

            if (myChart) {
                myChart.data.datasets = datasets;
                myChart.options.scales.y.max = maxRank + 1;
                myChart.options.scales.x.ticks.color = c.text;
                myChart.options.scales.x.grid.color = c.grid;
                myChart.options.scales.y.ticks.color = c.text;
                myChart.options.scales.y.grid.color = c.grid;
                myChart.options.scales.y.title.color = c.text;
                myChart.options.plugins.legend.labels.color = c.text;
                myChart.update();
            } else {
                myChart = new Chart(ctx, config);
            }
        }

        let bumpHighlightIdx = -1;

        function updateBumpChart() {
            const ctx = document.getElementById('bumpChart').getContext('2d');
            const c = getChartColors();

            // 최신 데이터 기준으로 등장하는 모든 키워드 수집 (최근 순위 순)
            const latest = allData[allData.length - 1];
            if (!latest) return;
            const keywords = [...latest.ranks];
            allKeywords.forEach(k => { if (!keywords.includes(k)) keywords.push(k); });

            const datasets = keywords.map((keyword, i) => {
                const points = [];
                for (const entry of allData) {
                    const rank = entry.ranks.indexOf(keyword) + 1;
                    points.push({ x: entry.timestamp, y: rank > 0 ? rank : 23 });
                }
                const isOOG = keyword === 'ㅇㅇㄱ';
                const isHighlighted = bumpHighlightIdx === i;
                const dimmed = bumpHighlightIdx >= 0 && !isHighlighted && !isOOG;
                return {
                    label: keyword,
                    data: points,
                    parsing: false,
                    borderColor: isOOG ? '#10b981' : (dimmed ? 'rgba(150,150,150,0.15)' : BUMP_COLORS[i % BUMP_COLORS.length]),
                    backgroundColor: isOOG ? '#10b981' : BUMP_COLORS[i % BUMP_COLORS.length],
                    borderWidth: isOOG ? 4 : (isHighlighted ? 3 : 1.5),
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    tension: 0,
                    spanGaps: true,
                    order: isOOG ? 0 : (isHighlighted ? 1 : 2)
                };
            });

            const config = {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    onHover: (event, elements, chart) => {
                        const nearest = chart.getElementsAtEventForMode(event, 'nearest', { intersect: false }, false);
                        const newIdx = nearest.length > 0 ? nearest[0].datasetIndex : -1;
                        if (newIdx !== bumpHighlightIdx) {
                            bumpHighlightIdx = newIdx;
                            updateBumpChart();
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'hour', tooltipFormat: 'yyyy-MM-dd HH:mm' },
                            ticks: { color: c.text },
                            grid: { color: c.grid }
                        },
                        y: {
                            reverse: true,
                            min: 1,
                            max: 23,
                            ticks: {
                                color: c.text,
                                stepSize: 1,
                                callback: v => v <= 22 ? v : '순위 밖'
                            },
                            grid: { color: c.grid },
                            title: { display: true, text: '순위', color: c.text }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'nearest',
                            intersect: false,
                            callbacks: {
                                label: ctx => ctx.raw.y <= 22
                                    ? `${ctx.raw.y}위 ${ctx.dataset.label}`
                                    : `순위 밖 ${ctx.dataset.label}`
                            }
                        }
                    }
                }
            };

            if (bumpChart) {
                bumpChart.data.datasets = datasets;
                bumpChart.options.scales.x.ticks.color = c.text;
                bumpChart.options.scales.x.grid.color = c.grid;
                bumpChart.options.scales.y.ticks.color = c.text;
                bumpChart.options.scales.y.grid.color = c.grid;
                bumpChart.options.scales.y.title.color = c.text;
                bumpChart.update('none');
            } else {
                bumpChart = new Chart(ctx, config);
            }
        }

        async function fetchData() {
            const status = document.getElementById('statusMessage');
            try {
                const res = await fetch(`${CSV_URL}?v=${Date.now()}`, { cache: 'no-store' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const text = await res.text();
                allData = [];
                allKeywords = new Set();
                parseCsv(text);
                renderCurrentRank();
                renderKeywordButtons();
                updateBumpChart();
                updateChart();
                status.classList.add('hidden');
            } catch (e) {
                console.error(e);
                status.textContent = `데이터 로드 실패: ${e.message}`;
                status.classList.remove('hidden');
            }
        }

        window.onload = () => {
            document.getElementById('darkModeBtn').textContent = isDarkMode ? '☀️' : '🌙';
            fetchData();
            setInterval(fetchData, 5 * 60 * 1000);

            document.getElementById('bumpChart').addEventListener('mouseleave', () => {
                if (bumpHighlightIdx !== -1) {
                    bumpHighlightIdx = -1;
                    updateBumpChart();
                }
            });
        };
    </script>
</body>
</html>
