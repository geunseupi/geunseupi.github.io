<!DOCTYPE html>
<html lang="ko">
<script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark')</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근스피</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js and necessary plugins for Time Series and Zoom/Pan -->
    
    <script src="https://cdn.jsdelivr.net/npm/hammerjs/hammer.min.js"></script> <!-- 요청하신 Hammer.js 포함 -->
    <!-- Chart.js v4+ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <!-- chartjs-plugin-zoom v2.2.0 (최신 버전으로 업데이트) -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0"></script>

    <style>
        /* 폰트 설정 및 기본 스타일 */
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        body.transitioning, body.transitioning .chart-canvas { transition: background-color 0.3s; }
        .dark body { background-color: #111827; }
        #chartContainer { max-width: 1200px; margin: 0 auto; }
        /* 차트 캔버스 스타일 */
        .chart-canvas {
            background-color: white;
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            touch-action: none;
        }

        /* 모바일 세로 */
        @media (max-width: 768px) and (orientation: portrait) {
            .chart-canvas { height: 50vh; }
            #chartContainer { padding: 0; }
        }
        /* 모바일 가로 */
        @media (max-height: 500px) and (orientation: landscape) {
            body { padding: 0.5rem; }
            #chartContainer h1, #chartContainer .bg-white.p-6, #lastUpdated { display: none; }
            .chart-canvas { height: calc(100vh - 1rem); border-radius: 0.5rem; }
        }
        /* 로딩 인디케이터 */
        #loadingIndicator {
            display: none; /* 초기에는 숨김 */
            position: absolute;
            inset: 0;
            background-color: rgba(255, 255, 255, 0.9);
            z-index: 10;
            border-radius: 1rem;
        }
        .dark .chart-canvas { background-color: #1f2937; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); }
        .dark #loadingIndicator { background-color: rgba(31, 41, 55, 0.9); }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary-blue': '#10b981',
                        'primary-dark': '#0f766e',
                    }
                }
            }
        }
    </script>
</head>
<body class="p-4 md:p-8 dark:text-gray-200">

    <div id="chartContainer" class="space-y-6">
        <div class="flex justify-center items-center gap-3">
            <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100 text-center">
                근스피
            </h1>
            <button onclick="toggleDarkMode()" id="darkModeBtn" class="text-xl" title="다크모드 토글">🌙</button>
        </div>

        <p class="text-sm text-orange-500 font-medium text-center hidden" id="frozenInfo"></p>
        <p class="text-sm text-gray-500 dark:text-gray-400 text-center hidden" id="totalDeletedInfo"></p>
        <p class="font-bold text-center hidden" id="dropInfo"></p>
        <p id="statusMessage" class="text-sm text-red-500 font-medium hidden text-center"></p>

        <!-- 차트 캔버스 -->
        <div class="chart-canvas h-[500px] relative">
            <div id="loadingIndicator" class="flex items-center justify-center text-lg font-medium text-gray-700 dark:text-gray-300">
                CSV 데이터를 불러오는 중...
            </div>

            <canvas id="timeSeriesChart" class="flex-1"></canvas>
        </div>

        <p class="text-sm text-gray-500 dark:text-gray-400 mt-4 text-center" id="lastUpdated">
            데이터 로드 대기 중...
        </p>

        <!-- 차트 컨트롤 -->
        <div class="flex justify-center">
            <button onclick="resetZoom()" id="resetButton" class="w-full sm:w-1/2 bg-gray-500 hover:bg-gray-600 dark:bg-gray-600 dark:hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 ease-in-out shadow-md hover:shadow-lg">
                🔄 차트 초기화 (Zoom/Pan 리셋)
            </button>
        </div>
        <div class="flex justify-center">
            <button onclick="toggleNoDrop()" id="noDropButton" class="text-xs text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 underline">
                글삭이 없었더라면?
            </button>
        </div>
    </div>

    <script>
        let myChart;
        let originalData = [];
        let originalRankData = [];
        let noDropMode = false;
        let isDarkMode = localStorage.getItem('darkMode') === 'true';

        // 페이지 로드 시 다크모드 즉시 적용 (깜빡임 방지)
        if (isDarkMode) document.documentElement.classList.add('dark');

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.add('transitioning');
            document.documentElement.classList.toggle('dark', isDarkMode);
            localStorage.setItem('darkMode', isDarkMode);
            document.getElementById('darkModeBtn').textContent = isDarkMode ? '☀️' : '🌙';
            applyChartTheme();
            setTimeout(() => document.body.classList.remove('transitioning'), 300);
        }

        function getChartColors() {
            return isDarkMode
                ? { text: '#d1d5db', grid: 'rgba(255,255,255,0.1)', tooltip: '#374151' }
                : { text: '#4b5563', grid: 'rgba(0,0,0,0.05)', tooltip: '#fff' };
        }

        function applyChartTheme() {
            if (!myChart) return;
            const c = getChartColors();
            myChart.options.scales.x.title.color = c.text;
            myChart.options.scales.x.ticks.color = c.text;
            myChart.options.scales.x.grid.color = c.grid;
            myChart.options.scales.y.title.color = c.text;
            myChart.options.scales.y.ticks.color = c.text;
            myChart.options.scales.y.grid.color = c.grid;
            if (myChart.options.scales.yRank) {
                myChart.options.scales.yRank.title.color = 'rgb(234, 179, 8)';
                myChart.options.scales.yRank.ticks.color = 'rgb(234, 179, 8)';
            }
            myChart.options.plugins.legend.labels.color = c.text;
            myChart.update('none');
        }
        const CSV_URL = 'https://raw.githubusercontent.com/geunseupi/geunseupi--data/main/data.csv';
        const UPDATE_INTERVAL_MS = 5 * 60 * 1000; // 5분
        const TWELVE_HOURS_IN_MS = 12 * 60 * 60 * 1000; // 12시간을 밀리초로 정의
        
        /**
         * CSV 텍스트를 Chart.js 데이터 형식으로 파싱합니다.
         */
        function parseCsvData(csvText) {
            const rows = csvText.trim().split('\n');
            if (rows.length < 2) return { data: [], rankData: [] };

            const header = rows[0].split(',').map(h => h.trim().toLowerCase());
            const data = [];
            const rankData = [];

            const timeIndex = header.indexOf('timestamp');
            const valueIndex = header.indexOf('value');
            const rankIndex = header.indexOf('rank');

            if (timeIndex === -1 || valueIndex === -1) {
                throw new Error("CSV 헤더에 'timestamp' 또는 'value'가 포함되어야 합니다.");
            }

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',').map(c => c.trim());

                if (cols.length > Math.max(timeIndex, valueIndex)) {
                    const timestamp = new Date(cols[timeIndex]);
                    const value = parseFloat(cols[valueIndex]);

                    if (!isNaN(timestamp.getTime()) && !isNaN(value)) {
                        const t = timestamp.getTime();
                        data.push({ x: t, y: value });

                        if (rankIndex !== -1 && cols.length > rankIndex) {
                            const rank = parseInt(cols[rankIndex]);
                            if (!isNaN(rank) && rank >= 1 && rank <= 20) {
                                rankData.push({ x: t, y: rank });
                            } else {
                                rankData.push({ x: t, y: 21 });
                            }
                        }
                    }
                }
            }

            data.sort((a, b) => a.x - b.x);
            rankData.sort((a, b) => a.x - b.x);
            return { data, rankData };
        }
        
        /**
         * GitHub Pages의 data.csv 파일을 비동기적으로 가져옵니다.
         */
        async function fetchData() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const lastUpdatedElement = document.getElementById('lastUpdated');
            const statusMessage = document.getElementById('statusMessage');

            loadingIndicator.style.display = 'flex';
            statusMessage.classList.add('hidden');
            lastUpdatedElement.textContent = '데이터를 불러오는 중...';

            try {
                // 캐시 문제 해결을 위해 쿼리 파라미터에 현재 시간을 추가합니다.
                const urlWithCacheBuster = `${CSV_URL}?v=${Date.now()}`;
                
                // cache: "no-store"를 사용하여 브라우저 캐시를 무시하고 최신 파일을 가져옵니다.
                const response = await fetch(urlWithCacheBuster, { cache: "no-store" }); 
                
                if (!response.ok) {
                    throw new Error(`HTTP 오류: ${response.status} (${response.statusText}). GitHub에 ${CSV_URL} 파일이 올바르게 커밋되었는지 확인하세요.`);
                }
                
                const csvText = await response.text();
                const parsed = parseCsvData(csvText);
                const dataPoints = parsed.data;
                const rankPoints = parsed.rankData;

                if (dataPoints.length === 0) {
                     throw new Error("CSV 파일을 읽었으나 유효한 데이터 포인트가 없습니다. 헤더와 데이터 형식을 확인하세요.");
                }

                originalData = dataPoints;
                originalRankData = rankPoints;
                updateChart(noDropMode ? buildNoDropData(dataPoints) : dataPoints, rankPoints);

                const latestDataPoint = dataPoints[dataPoints.length - 1];
                const latestTime = new Date(latestDataPoint.x);
                lastUpdatedElement.textContent = `✅ 마지막 데이터 기록 시간: ${latestTime.toLocaleString('ko-KR')}`;

                // 데이터 동결 시간 표시
                const frozenInfo = document.getElementById('frozenInfo');
                let frozenSince = latestDataPoint.x;
                for (let i = dataPoints.length - 2; i >= 0; i--) {
                    // 값이 증가한 경우만 심정지 해제 (하락은 심정지 유지)
                    if (dataPoints[i].y < dataPoints[i + 1].y) break;
                    frozenSince = dataPoints[i].x;
                }
                const frozenMs = latestDataPoint.x - frozenSince;
                if (frozenMs >= 60 * 60 * 1000) {
                    const days = Math.floor(frozenMs / (24 * 60 * 60 * 1000));
                    const hours = Math.floor((frozenMs % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
                    const mins = Math.floor((frozenMs % (60 * 60 * 1000)) / (60 * 1000));
                    let durationText = '';
                    if (days > 0) durationText += `${days}일 `;
                    if (hours > 0) durationText += `${hours}시간 `;
                    if (mins > 0) durationText += `${mins}분`;
                    frozenInfo.textContent = `🫀 ${durationText}째 심정지 중!`;
                    frozenInfo.classList.remove('hidden');
                } else {
                    frozenInfo.classList.add('hidden');
                }

                // 총 삭제된 게시글 수 계산
                const totalDeletedInfo = document.getElementById('totalDeletedInfo');
                let totalDeleted = 0;
                for (let i = 1; i < dataPoints.length; i++) {
                    const diff = dataPoints[i].y - dataPoints[i - 1].y;
                    if (diff < 0) totalDeleted += Math.abs(diff);
                }
                if (totalDeleted > 0) {
                    totalDeletedInfo.textContent = `🗑️ 총 삭제된 게시글: ${Math.round(totalDeleted)}개`;
                    totalDeletedInfo.classList.remove('hidden');
                } else {
                    totalDeletedInfo.classList.add('hidden');
                }

                // 최근 급락 구간 감지
                const dropInfo = document.getElementById('dropInfo');
                const THIRTY_MIN = 30 * 60 * 1000;
                let segments = [];
                let seg = null;

                for (let i = 1; i < dataPoints.length; i++) {
                    const prev = dataPoints[i - 1];
                    const curr = dataPoints[i];
                    if (curr.y < prev.y) {
                        if (!seg) {
                            seg = { startTime: prev.x, endTime: curr.x, peak: prev.y, low: curr.y, lastDropTime: curr.x };
                        } else if (curr.x - seg.lastDropTime <= THIRTY_MIN) {
                            seg.endTime = curr.x;
                            seg.peak = Math.max(seg.peak, prev.y);
                            seg.low = Math.min(seg.low, curr.y);
                            seg.lastDropTime = curr.x;
                        } else {
                            segments.push(seg);
                            seg = { startTime: prev.x, endTime: curr.x, peak: prev.y, low: curr.y, lastDropTime: curr.x };
                        }
                    } else if (seg && curr.x - seg.lastDropTime > THIRTY_MIN) {
                        segments.push(seg);
                        seg = null;
                    }
                }
                if (seg) segments.push(seg);

                const twentyFourHoursAgo = Date.now() - 24 * 60 * 60 * 1000;
                const bigDrops = segments.filter(s => s.peak - s.low >= 5 && s.startTime >= twentyFourHoursAgo);
                if (bigDrops.length > 0) {
                    const recent = bigDrops[bigDrops.length - 1];
                    const dropAmount = Math.round(recent.peak - recent.low);
                    const dropTime = new Date(recent.startTime).toLocaleString('ko-KR');
                    let label;
                    if (dropAmount >= 100) label = '🚨 어디가노 게이야!!!!';
                    else if (dropAmount >= 50) label = '🚨 비상!!!!!!';
                    else if (dropAmount >= 20) label = '📉 떡락!!!';
                    else label = '📉 소폭 하락';
                    dropInfo.textContent = `${label} — ${dropTime}에 ${dropAmount}개 하락 (${Math.round(recent.peak)} → ${Math.round(recent.low)})`;
                    if (dropAmount >= 100) { dropInfo.style.color = '#991b1b'; dropInfo.style.fontSize = '1.5rem'; }
                    else if (dropAmount >= 50) { dropInfo.style.color = '#dc2626'; dropInfo.style.fontSize = '1.25rem'; }
                    else if (dropAmount >= 20) { dropInfo.style.color = '#ef4444'; dropInfo.style.fontSize = '1.1rem'; }
                    else { dropInfo.style.color = '#f87171'; dropInfo.style.fontSize = '0.9rem'; }
                    dropInfo.classList.remove('hidden');
                } else {
                    dropInfo.classList.add('hidden');
                }

            } catch (error) {
                console.error("데이터 로드 및 파싱 실패:", error);
                statusMessage.textContent = `🚨 데이터 로드 오류: ${error.message}`;
                statusMessage.classList.remove('hidden');
                lastUpdatedElement.textContent = '❌ 데이터 로드 실패';
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }

        /**
         * Y축 스케일을 현재 보이는 데이터 범위에 맞게 조정합니다.
         */
        const autoAdjustYScale = ({ chart }) => {
            const xScale = chart.scales.x;
            const dataPoints = chart.data.datasets[0].data; 
            
            const xMin = xScale.min;
            const xMax = xScale.max;
            
            let yValues = [];
            
            for (const point of dataPoints) {
                // point.x는 타임스탬프 (숫자)
                if (point.x >= xMin && point.x <= xMax) {
                    yValues.push(point.y);
                }
            }
            
            if (yValues.length > 0) {
                const minY = Math.min(...yValues);
                const maxY = Math.max(...yValues);

                const padding = Math.max((maxY - minY) * 0.1, 5);
                const newMinY = Math.floor(minY - padding);
                const newMaxY = Math.ceil(maxY + padding);

                const yOpts = chart.options.scales.y;
                yOpts.min = newMinY < 0 ? 0 : newMinY;
                yOpts.max = newMaxY;

                const range = newMaxY - (newMinY < 0 ? 0 : newMinY);
                if (range <= 20) yOpts.ticks.stepSize = 1;
                else delete yOpts.ticks.stepSize;

                chart.update('none');
            } else {
                 chart.options.scales.y.min = undefined;
                 chart.options.scales.y.max = undefined;
                 chart.update('none');
            }
        };

        /**
         * 차트 인스턴스를 생성하거나 기존 인스턴스의 데이터를 업데이트합니다.
         */
        function updateChart(dataPoints, rankPoints) {
            const ctx = document.getElementById('timeSeriesChart').getContext('2d');

            // 1. 전체 데이터 범위 계산 (Limits 및 Reset 기준 설정용)
            const fullMinTime = dataPoints.length > 0 ? dataPoints[0].x : undefined;
            const fullMaxTime = dataPoints.length > 0 ? dataPoints[dataPoints.length - 1].x : undefined;

            rankPoints = rankPoints || [];

            const data = {
                datasets: [{
                    label: '근스피',
                    data: dataPoints,
                    parsing: false,
                    yAxisID: 'y',
                    borderColor: 'rgb(16, 185, 129)',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    tension: 0,
                    fill: false
                }, {
                    label: '순위',
                    data: rankPoints,
                    parsing: false,
                    yAxisID: 'yRank',
                    borderColor: 'rgb(234, 179, 8)',
                    backgroundColor: 'rgba(234, 179, 8, 0.1)',
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    tension: 0.3,
                    fill: false,
                    spanGaps: true,
                    borderDash: [4, 4]
                }]
            };

            const c = getChartColors();
            const config = {
                type: 'line',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day',
                                tooltipFormat: 'yyyy-MM-dd HH:mm:ss'
                            },
                            title: { display: true, text: '시간 (Timestamp)', color: c.text },
                            ticks: { color: c.text },
                            grid: { color: c.grid }
                        },
                        y: {
                            position: 'left',
                            beginAtZero: false,
                            title: { display: false },
                            ticks: {
                                color: c.text,
                                callback: v => Math.round(v)
                            },
                            grid: { color: c.grid }
                        },
                        yRank: {
                            position: 'right',
                            reverse: true,
                            min: 1,
                            max: 21,
                            title: { display: false, text: '검색순위', color: 'rgb(234, 179, 8)' },
                            ticks: {
                                color: 'rgb(234, 179, 8)',
                                stepSize: 1,
                                callback: v => v <= 20 ? v + '' : '순위 밖'
                            },
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        decimation: {
                            enabled: true,
                            algorithm: 'lttb',
                            samples: 500
                        },
                        legend: { display: true, position: 'top', labels: { color: c.text } },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    if (context.dataset.yAxisID === 'yRank') {
                                        return context.raw.y <= 20
                                            ? `${context.dataset.label}: ${context.raw.y}위`
                                            : `${context.dataset.label}: 권외`;
                                    }
                                    return `${context.dataset.label}: ${context.formattedValue}`;
                                }
                            }
                        },
                        zoom: {
                            zoom: {
                                enabled: true, 
                                wheel: { enabled: true, modifierKey: null }, // Shift 키 없이 휠 줌
                                pinch: { enabled: true },
                                mode: 'x', 
                                speed: 0.1,
                                duration: 0, 
                                onZoomComplete: autoAdjustYScale, 
                            },
                            pan: {
                                enabled: true,
                                mode: 'x', 
                                threshold: 5,
                                modifierKey: null, // Shift 키 없이 드래그 Pan
                                onPanComplete: autoAdjustYScale, 
                            },
                            // Zoom Limits는 항상 전체 데이터 범위를 사용합니다.
                            limits: { 
                                x: { 
                                    min: fullMinTime,
                                    max: fullMaxTime
                                } 
                            } 
                        }
                    }
                }
            };

            if (myChart) {
                // ----------------- 기존 차트 업데이트 (줌 상태 유지) -----------------
                myChart.data.datasets[0].data = dataPoints;
                if (myChart.data.datasets[1]) myChart.data.datasets[1].data = rankPoints;

                myChart.options.plugins.zoom.limits.x.min = fullMinTime;
                myChart.options.plugins.zoom.limits.x.max = fullMaxTime;

                myChart.update();
                autoAdjustYScale({ chart: myChart });
                
            } else {
                // ----------------- 새 차트 생성 (최초 12시간 줌 적용) -----------------
                if (dataPoints.length > 0) {
                    const latestTime = dataPoints[dataPoints.length - 1].x; // 가장 최신 타임스탬프 (밀리초)
                    const startTime = latestTime - TWELVE_HOURS_IN_MS; // 12시간 전 시간 계산

                    // X축 초기 범위 설정: 12시간 뷰로 시작
                    config.options.scales.x.min = startTime;
                    config.options.scales.x.max = latestTime;
                }
                
                myChart = new Chart(ctx, config);
                autoAdjustYScale({ chart: myChart });
            }
            document.getElementById('resetButton').disabled = false;
        }

        /**
         * 줌 및 팬 상태를 초기화합니다. (전체 데이터 범위로 돌아감)
         */
        function resetZoom() {
            if (myChart && myChart.resetZoom) {
                // resetZoom()은 limits에 설정된 전체 데이터 범위로 돌아갑니다.
                myChart.resetZoom();
                
                // Y축도 초기 전체 데이터 범위로 재조정
                myChart.scales.y.min = undefined;
                myChart.scales.y.max = undefined;
                
                // 줌 리셋 후 자동 Y축 스케일링을 다시 실행합니다.
                // resetZoom() 호출 후 약간의 딜레이가 필요할 수 있으나,
                // Chart.js 줌 플러그인이 이를 비동기적으로 처리하므로, update('none') 후 다시 호출합니다.
                myChart.update('none');
                autoAdjustYScale({ chart: myChart });
            }
        }

        function buildNoDropData(data) {
            if (data.length === 0) return [];
            const result = [{ x: data[0].x, y: data[0].y }];
            let offset = 0;
            for (let i = 1; i < data.length; i++) {
                const diff = data[i].y - data[i - 1].y;
                if (diff < 0) offset -= diff;
                result.push({ x: data[i].x, y: data[i].y + offset });
            }
            return result;
        }

        function toggleNoDrop() {
            noDropMode = !noDropMode;
            const btn = document.getElementById('noDropButton');
            btn.textContent = noDropMode ? '현실로 돌아가기' : '글삭이 없었더라면?';
            if (myChart && originalData.length > 0) {
                const newData = noDropMode ? buildNoDropData(originalData) : originalData;
                if (myChart.data.datasets[1]) myChart.data.datasets[1].data = originalRankData;
                const oldData = myChart.data.datasets[0].data;

                // 현재 Y축 범위 저장
                const oldMin = myChart.options.scales.y.min;
                const oldMax = myChart.options.scales.y.max;

                // 새 Y축 범위 계산
                const xMin = myChart.scales.x.min;
                const xMax = myChart.scales.x.max;
                let yVals = newData.filter(p => p.x >= xMin && p.x <= xMax).map(p => p.y);
                if (yVals.length === 0) yVals = newData.map(p => p.y);
                const minY = Math.min(...yVals);
                const maxY = Math.max(...yVals);
                const pad = Math.max((maxY - minY) * 0.1, 5);
                const targetMin = Math.floor(minY - pad) < 0 ? 0 : Math.floor(minY - pad);
                const targetMax = Math.ceil(maxY + pad);

                // 보간용 스냅샷 (oldData와 newData의 y값을 x기준으로 매칭)
                const oldMap = new Map(oldData.map(p => [p.x, p.y]));

                const duration = 800;
                const startTime = performance.now();
                function easeInOutQuart(t) {
                    return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
                }
                function animate(now) {
                    const elapsed = now - startTime;
                    const t = Math.min(elapsed / duration, 1);
                    const e = easeInOutQuart(t);

                    // 데이터 보간
                    const interpolated = newData.map(p => {
                        const oldY = oldMap.has(p.x) ? oldMap.get(p.x) : p.y;
                        return { x: p.x, y: oldY + (p.y - oldY) * e };
                    });
                    myChart.data.datasets[0].data = interpolated;

                    // Y축 보간
                    myChart.options.scales.y.min = oldMin + (targetMin - oldMin) * e;
                    myChart.options.scales.y.max = oldMax + (targetMax - oldMax) * e;

                    myChart.update('none');
                    if (t < 1) requestAnimationFrame(animate);
                    else {
                        myChart.data.datasets[0].data = newData;
                        myChart.update('none');
                    }
                }
                requestAnimationFrame(animate);
            }
        }

        // 초기 로드 시 차트 렌더링 및 5분마다 업데이트 설정.
        window.onload = () => {
             document.getElementById('darkModeBtn').textContent = isDarkMode ? '☀️' : '🌙';
             fetchData();
             setInterval(fetchData, UPDATE_INTERVAL_MS);
        };

    </script>
</body>
</html>
